---
layout: default
---
<article class="text-post">
  {% if page.title %}<h1>{{ page.title }}</h1>{% endif %}
  {% if page.author or page.date %}
  <p class="byline">
    {% if page.author %}{{ page.author }}{% endif %}
    {% if page.author and page.date %} · {% endif %}
    {% if page.date %}{{ page.date | date: "%B %Y" }}{% endif %}
  </p>
  {% endif %}
  <div class="text-body">
    {{ content }}
  </div>
</article>
