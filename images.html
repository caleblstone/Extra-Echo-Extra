---
layout: default
title: Images
permalink: /images/
left_text: true
body_class: images-page
---
<div class="images-scroll">
  {% assign sorted_images = site.images | sort: "date" | reverse %}
  {% for img in sorted_images %}
  {% if img.image %}
  <figure class="image-figure">
    <img src="{{ img.image | relative_url }}" alt="{{ img.title }}">
  </figure>
  {% endif %}
  {% endfor %}
</div>
